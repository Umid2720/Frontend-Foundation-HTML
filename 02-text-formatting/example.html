<!DOCTYPE html>

  <title>2-dars — Text formatting</title>
</head>
<body>
  <h1>2-dars: Text formatting</h1>

  <p>Men <strong>Umidbek</strong>man. Men web dasturlashni <em>muntazam</em> o‘rganayapman.</p>

  <p>
    Hozir men <strong>HTML</strong> va keyin <em>CSS</em> o‘rganishni rejalashtiryapman.
  </p>

  <p>
    Nesting misoli:
    <strong><em>Hello, World!</em></strong>
  </p>

  <p>
    Bu yerda <strong>br</strong> ishlatilgan:<br>
    1-qator<br>
    2-qator<br>
    3-qator
  </p>
</body>
</html>
